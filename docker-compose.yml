services:
  app:
    image: luzaramburo/cbz-tool:latest
    ports:
      - "3000:3000"
    volumes:
      - app-data:/app/data   # persist any data
    environment:
      - MAX_FILE_SIZE_MB=100  # default is 100; change to override the upload limit
      - DATA_DIR=/app/data
    restart: unless-stopped

volumes:
  app-data: